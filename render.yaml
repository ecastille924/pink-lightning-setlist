services:
  # Web Service
  - type: web
    name: pink-lightning-setlist
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pink-lightning-db
          property: connectionString

  # PostgreSQL Database
  - type: pserv
    name: pink-lightning-db
    runtime: postgresql
    plan: free
    ipAllowList: []
