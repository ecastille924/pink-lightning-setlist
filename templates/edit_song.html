{% extends "base.html" %}

{% block title %}Edit Song{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">
        <i class="bi bi-pencil"></i>
        Edit Song
    </h1>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ song.title }}" required autocomplete="off">
                            <div id="duplicateWarning" class="alert alert-warning mt-2" style="display: none;">
                                <i class="bi bi-exclamation-triangle"></i> 
                                <strong>Warning:</strong> Another song with this title already exists in the database.
                                <div id="existingSongs" class="mt-2 small"></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="artist" class="form-label">Artist <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="artist" name="artist" value="{{ song.artist }}" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="key" class="form-label">Key</label>
                            <input type="text" class="form-control" id="key" name="key" value="{{ song.key or '' }}">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="genre" class="form-label">Genre</label>
                            <input type="text" class="form-control" id="genre" name="genre" value="{{ song.genre or '' }}">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="era" class="form-label">Era</label>
                            <input type="text" class="form-control" id="era" name="era" value="{{ song.era or '' }}">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Lead Vocals</label>
                            <select class="form-select" name="lead_vocals">
                                <option value="" {% if not song.lead_vocals %}selected{% endif %}>Select vocalist...</option>
                                <option value="Lauren" {% if song.lead_vocals == 'Lauren' %}selected{% endif %}>Lauren</option>
                                <option value="Erick" {% if song.lead_vocals == 'Erick' %}selected{% endif %}>Erick</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="frequency_weight" class="form-label">Frequency Weight %</label>
                            <input type="number" class="form-control" id="frequency_weight" name="frequency_weight" 
                                   min="0" max="100" step="1" value="{{ song.frequency_weight }}">
                            <small class="form-text text-muted">Higher % = more likely to appear in setlists</small>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Set Placement Options</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="first_set_only" name="first_set_only" 
                               {% if song.first_set_only %}checked{% endif %}>
                        <label class="form-check-label" for="first_set_only">First Set Only</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="second_set_only" name="second_set_only"
                               {% if song.second_set_only %}checked{% endif %}>
                        <label class="form-check-label" for="second_set_only">Second Set Only</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="potential_starting_song" name="potential_starting_song"
                               {% if song.potential_starting_song %}checked{% endif %}>
                        <label class="form-check-label" for="potential_starting_song">Potential Starting Song</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="potential_final_song" name="potential_final_song"
                               {% if song.potential_final_song %}checked{% endif %}>
                        <label class="form-check-label" for="potential_final_song">Potential Final Song</label>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Save Changes
                    </button>
                    <a href="{{ url_for('main.list_songs') }}" class="btn btn-secondary">
                        <i class="bi bi-x-lg"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
let allSongs = [];
const currentSongId = {{ song.id }};

// Load all songs on page load
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/songs')
        .then(response => response.json())
        .then(songs => {
            allSongs = songs;
            setupAutocomplete();
        })
        .catch(error => {
            console.error('Error loading songs:', error);
        });
});

function setupAutocomplete() {
    const titleInput = document.getElementById('title');
    const duplicateWarning = document.getElementById('duplicateWarning');
    const existingSongsDiv = document.getElementById('existingSongs');

    // Create autocomplete dropdown
    const suggestionsContainer = document.createElement('div');
    suggestionsContainer.className = 'autocomplete-suggestions';
    suggestionsContainer.style.cssText = `
        position: absolute;
        background-color: var(--soft-black, #2d2d2d);
        border: 1px solid var(--primary-pink, #ff69b4);
        border-top: none;
        max-height: 200px;
        overflow-y: auto;
        z-index: 1000;
        display: none;
        width: 100%;
        border-radius: 0 0 8px 8px;
    `;
    titleInput.parentElement.style.position = 'relative';
    titleInput.parentElement.appendChild(suggestionsContainer);

    // Handle input
    titleInput.addEventListener('input', function() {
        const value = this.value.toLowerCase().trim();
        suggestionsContainer.innerHTML = '';
        suggestionsContainer.style.display = 'none';

        if (value.length < 2) {
            duplicateWarning.style.display = 'none';
            return;
        }

        // Find matching songs
        const matches = allSongs.filter(song => 
            song.title.toLowerCase().includes(value)
        );

        // Check for exact title matches (excluding current song)
        const exactMatches = allSongs.filter(song => 
            song.title.toLowerCase() === value && song.id !== currentSongId
        );

        if (exactMatches.length > 0) {
            // Show warning for exact matches
            existingSongsDiv.innerHTML = exactMatches.map(song => 
                `<div class="mb-1">
                    <strong>${song.title}</strong> by ${song.artist}
                    ${song.key ? `(${song.key})` : ''}
                </div>`
            ).join('');
            duplicateWarning.style.display = 'block';
        } else {
            duplicateWarning.style.display = 'none';
        }

        // Show suggestions (excluding current song)
        const filteredMatches = matches.filter(song => song.id !== currentSongId);
        if (filteredMatches.length > 0 && filteredMatches.length <= 10) {
            filteredMatches.forEach(song => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                div.style.cssText = `
                    padding: 10px;
                    cursor: pointer;
                    border-bottom: 1px solid var(--border-gray, #4a4a4a);
                    color: var(--text-gray, #e0e0e0);
                `;
                div.innerHTML = `
                    <strong>${song.title}</strong> 
                    <small class="text-muted">by ${song.artist}</small>
                `;

                div.addEventListener('mouseenter', function() {
                    this.style.backgroundColor = 'var(--light-black, #3d3d3d)';
                    this.style.color = 'var(--primary-pink, #ff69b4)';
                });

                div.addEventListener('mouseleave', function() {
                    this.style.backgroundColor = '';
                    this.style.color = 'var(--text-gray, #e0e0e0)';
                });

                div.addEventListener('click', function() {
                    titleInput.value = song.title;
                    suggestionsContainer.style.display = 'none';

                    // Show duplicate warning
                    existingSongsDiv.innerHTML = `
                        <div class="mb-1">
                            <strong>${song.title}</strong> by ${song.artist}
                            ${song.key ? `(${song.key})` : ''}
                        </div>
                    `;
                    duplicateWarning.style.display = 'block';
                });

                suggestionsContainer.appendChild(div);
            });
            suggestionsContainer.style.display = 'block';
        }
    });

    // Hide suggestions when clicking outside
    document.addEventListener('click', function(e) {
        if (e.target !== titleInput) {
            suggestionsContainer.style.display = 'none';
        }
    });
}
</script>
{% endblock %}
